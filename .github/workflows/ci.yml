name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Format check
        run: |
          gofmt -l .
          test -z "$(gofmt -l .)" || (echo "Run gofmt -w ." && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...
